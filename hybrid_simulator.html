          leg
            .append("rect")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", legW)
            .attr("height", legH)
            .attr("rx", 10)
            .attr("ry", 10)
            .attr("fill", "var(--legendBg)")
            .attr("stroke", "var(--legendStroke)");

          const items = [
            { name: "persist", c: COLORS.persist, y: 16 },
            { name: "reactivated", c: COLORS.react, y: 32 },
            { name: "new", c: COLORS.novel, y: 48 },
            { name: "churn", c: COLORS.churn, y: 64 },
          ];

          leg
            .selectAll("circle.l")
            .data(items)
            .join("circle")
            .attr("cx", 12)
            .attr("cy", (d) => d.y)
            .attr("r", 4)
            .attr("fill", (d) => d.c);

          leg
            .selectAll("text.l")
            .data(items)
            .join("text")
            .attr("x", 22)
            .attr("y", (d) => d.y + 3)
            .attr("fill", "var(--text)")
            .attr("font-size", 11)
            .attr("opacity", 0.92)
            .text((d) => d.name);
        }

        function renderPi(svgSel, rows) {
          const svg = d3.select(svgSel);
          const node = svg.node();
          const W = node.clientWidth || 0;
          const H = node.clientHeight || 0;
          if (W < 30 || H < 30) return;

          svg.selectAll("*").remove();

          const margin = { top: 16, right: 10, bottom: 26, left: 38 };
          const w = W - margin.left - margin.right;
          const h = H - margin.top - margin.bottom;

          const g = svg
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

          const x = d3
            .scaleLinear()
            .domain([0, T - 1])
            .range([0, w]);
          const y = d3.scaleLinear().domain([-0.05, 1.05]).range([h, 0]);

          g.append("g")
            .attr("transform", `translate(0,${h})`)
            .call(
              d3
                .axisBottom(x)
                .ticks(T)
                .tickFormat((d) => "D" + (d + 1)),
            );
          g.append("g").call(d3.axisLeft(y).ticks(5));

          g.append("line")
            .attr("x1", 0)
            .attr("x2", w)
            .attr("y1", y(0))
            .attr("y2", y(0))
            .attr("stroke", "var(--axisZero)");

          const line = d3
            .line()
            .defined((d) => isFinite(d.v))
            .x((d) => x(d.t))
            .y((d) => y(d.v))
            .curve(d3.curveCatmullRom.alpha(0.8));

          const F = rows.map((r) => ({ t: r.t, v: r.piF, licSize: r.licSize }));
          const R = rows.map((r) => ({ t: r.t, v: r.piR, licSize: r.licSize }));

          g.append("path")
            .datum(F)
            .attr("d", line)
            .attr("fill", "none")
            .attr("stroke", COLORS.edgeFF)
            .attr("stroke-width", 2.0)
            .attr("opacity", 0.95);

          g.append("path")
            .datum(R)
            .attr("d", line)
            .attr("fill", "none")
            .attr("stroke", COLORS.edgeRR)
            .attr("stroke-width", 2.0)
            .attr("opacity", 0.9);

          function drawDots(arr, color, label) {
            g.selectAll("circle." + label)
              .data(arr)
              .join("circle")
              .attr("class", label)
              .attr("r", 3.2)
              .attr("cx", (d) => x(d.t))
              .attr("cy", (d) => y(isFinite(d.v) ? d.v : 0.5))
              .attr("fill", (d) => (isFinite(d.v) ? color : "var(--naCell)"))
              .attr("stroke", "var(--dotStroke)")
              .attr("stroke-width", 0.7)
              .attr("opacity", (d) => (isFinite(d.v) ? 0.95 : 0.35))
              .on("mousemove", (evt, d) => {
                showTip(
                  `<div><b>π-mass</b> <span class="pill">D${d.t + 1}</span></div>
               <div class="muted">${label === "F" ? "Farms" : "Regions"}: <span class="mono">${isFinite(d.v) ? d.v.toFixed(3) : "NA"}</span></div>
               <div class="muted">LIC size: <span class="mono">${d.licSize}</span></div>`,
                  evt,
                );
              })
              .on("mouseleave", hideTip);
          }
          drawDots(F, COLORS.edgeFF, "F");
          drawDots(R, COLORS.edgeRR, "R");

          const day = state.day;
          g.append("line")
            .attr("x1", x(day))
            .attr("x2", x(day))
            .attr("y1", 0)
            .attr("y2", h)
            .attr("stroke", "var(--dashLine)")
            .attr("stroke-dasharray", "3,3");

          // Legend (F vs R)
          const legW = 116,
            legH = 44;
          const legX = Math.max(6, w - legW - 6);
          const legY = 6;

          const leg = g
            .append("g")
            .attr("transform", `translate(${legX},${legY})`);
          leg
            .append("rect")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", legW)
            .attr("height", legH)
            .attr("rx", 10)
            .attr("ry", 10)
            .attr("fill", "var(--legendBg)")
            .attr("stroke", "var(--legendStroke)");

          const items = [
            { name: "F (farms)", c: COLORS.edgeFF, y: 16 },
            { name: "R (regions)", c: COLORS.edgeRR, y: 32 },
          ];

          leg
            .selectAll("circle.l")
            .data(items)
            .join("circle")
            .attr("cx", 12)
            .attr("cy", (d) => d.y)
            .attr("r", 4)
            .attr("fill", (d) => d.c);

          leg
            .selectAll("text.l")
            .data(items)
            .join("text")
            .attr("x", 22)
            .attr("y", (d) => d.y + 3)
            .attr("fill", "var(--text)")
            .attr("font-size", 11)
            .attr("opacity", 0.92)
            .text((d) => d.name);
        }

        function padDomain([a, b], frac) {
          if (!isFinite(a) || !isFinite(b)) return [0, 1];
          if (a === b) {
            const eps = (Math.abs(a) + 1) * 0.1;
            return [a - eps, b + eps];
          }
          const pad = (b - a) * (frac ?? 0.05);
          return [a - pad, b + pad];
        }

        function renderMagHeatmap(svgSel, magSeries) {
          const svg = d3.select(svgSel);
          const node = svg.node();
          const W = node.clientWidth || 0;
          const H = node.clientHeight || 0;
          if (W < 30 || H < 30) return;

          svg.selectAll("*").remove();

          const K = state.kEig;

          const topH = 54;
          const rightW = 72;
          const margin = { top: 18, right: 12, bottom: 32, left: 52 };

          const wMain = Math.max(10, W - margin.left - margin.right - rightW);
          const hMain = Math.max(10, H - margin.top - margin.bottom - topH);

          const gRoot = svg
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

          const tVals = d3.range(0, T);
          const kVals = d3.range(0, K);

          const xBand = d3
            .scaleBand()
            .domain(tVals)
            .range([0, wMain])
            .padding(0.02);
          const yBand = d3
            .scaleBand()
            .domain(kVals)
            .range([0, hMain])
            .padding(0.02);

          const rows = Array.isArray(magSeries) ? magSeries : [];
          const hasZeroBasedT = rows.some((r) => Number(r && r.t) === 0);
          const hasOneBasedT =
            !hasZeroBasedT && rows.some((r) => Number(r && r.t) === 1);
          const tOffset = hasOneBasedT ? 1 : 0;

          const seriesByT = new Map();
          rows.forEach((r, idx) => {
            if (!r) return;
            const rawT = Number(r.t);
            const t = Number.isFinite(rawT) ? rawT - tOffset : idx;
            if (t >= 0 && t < T && !seriesByT.has(t)) {
              seriesByT.set(t, r.vals || []);
            }
          });

          const cells = [];
          for (let t = 0; t < T; t++) {
            const vals = seriesByT.get(t) || [];
            for (let k = 0; k < K; k++) {
              const v = k < vals.length ? vals[k] : NaN;
              cells.push({ t, k, v });
            }
          }

          const finiteVals = cells.map((d) => d.v).filter((v) => isFinite(v));
          const vMin = finiteVals.length ? d3.min(finiteVals) : 0;
          const vMax = finiteVals.length ? d3.max(finiteVals) : 1;

          const color = d3
            .scaleSequential(d3.interpolateTurbo)
            .domain([vMin, vMax]);

          const colMeans = tVals.map((t) => {
            const vals = seriesByT.get(t) || [];
            const xs = vals.slice(0, K).filter((v) => isFinite(v));
            const m = xs.length ? d3.mean(xs) : NaN;
            return { t, m };
          });

          const colFinite = colMeans.map((d) => d.m).filter((v) => isFinite(v));
          const colMin = colFinite.length ? d3.min(colFinite) : vMin;
          const colMax = colFinite.length ? d3.max(colFinite) : vMax;
          const yTop = d3
            .scaleLinear()
            .domain(padDomain([colMin, colMax], 0.08))
            .range([topH - 14, 2]);

          const gTop = gRoot.append("g").attr("transform", `translate(0,0)`);
          gTop
            .append("rect")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", wMain)
            .attr("height", topH - 4)
            .attr("fill", "var(--panelOverlay)")
            .attr("stroke", "var(--panelOverlayStroke)");

          const xCenter = (t) => xBand(t) + xBand.bandwidth() / 2;

          const topLine = d3
            .line()
            .defined((d) => isFinite(d.m))
            .x((d) => xCenter(d.t))
            .y((d) => yTop(d.m))
            .curve(d3.curveCatmullRom.alpha(0.75));

          gTop
            .append("path")
            .datum(colMeans)
            .attr("d", topLine)
            .attr("fill", "none")
            .attr("stroke", COLORS.avgLine)
            .attr("stroke-width", 1.6)
            .attr("opacity", 0.92);

          gTop
            .append("text")
            .attr("x", 8)
            .attr("y", 12)
            .attr("fill", "var(--muted)")
            .attr("font-size", 10)
            .attr("font-weight", 650)
            .text("mean over λ (per day)");

          const gHeat = gRoot
            .append("g")
            .attr("transform", `translate(0,${topH})`);

          gHeat
            .append("g")
            .attr("transform", `translate(0,${hMain})`)
            .call(d3.axisBottom(xBand).tickFormat((d) => "D" + (d + 1)));

          gHeat
            .append("g")
            .call(d3.axisLeft(yBand).tickFormat((d) => "λ" + (d + 1)));

          gHeat
            .selectAll("rect.cell")
            .data(cells)
            .join("rect")
            .attr("class", "cell")
            .attr("x", (d) => xBand(d.t))
            .attr("y", (d) => yBand(d.k))
            .attr("width", xBand.bandwidth())
            .attr("height", yBand.bandwidth())
            .attr("rx", 3)
            .attr("ry", 3)
            .attr("fill", (d) => (isFinite(d.v) ? color(d.v) : "var(--naCell)"))
            .attr("opacity", 0.95)
            .on("mousemove", (evt, d) => {
              showTip(
                `<div><b>Magnetic spectrum</b> <span class="pill">D${d.t + 1}</span> <span class="pill">λ${d.k + 1}</span></div>
             <div class="muted">value: <span class="mono">${isFinite(d.v) ? d.v.toFixed(6) : "pending"}</span></div>`,
                evt,
              );
            })
            .on("mouseleave", hideTip);

          const day = state.day;
          const xDay = xCenter(day);

          gTop
            .append("line")
            .attr("x1", xDay)
            .attr("x2", xDay)
            .attr("y1", 0)
            .attr("y2", topH - 4)
            .attr("stroke", "var(--dashLine)")
            .attr("stroke-dasharray", "3,3");

          gHeat
            .append("line")
            .attr("x1", xDay)
            .attr("x2", xDay)
            .attr("y1", 0)
            .attr("y2", hMain)
            .attr("stroke", "var(--dashLine)")
            .attr("stroke-dasharray", "3,3");

          const rowMeans = kVals.map((k) => {
            const xs = [];
            for (let t = 0; t < T; t++) {
              const vals = seriesByT.get(t) || [];
              const v = k < vals.length ? vals[k] : NaN;
              if (isFinite(v)) xs.push(v);
            }
            const m = xs.length ? d3.mean(xs) : NaN;
            return { k, m };
          });

          const rowFinite = rowMeans.map((d) => d.m).filter((v) => isFinite(v));
          const rowMin = rowFinite.length ? d3.min(rowFinite) : vMin;
          const rowMax = rowFinite.length ? d3.max(rowFinite) : vMax;
          const xRight = d3
            .scaleLinear()
            .domain(padDomain([rowMin, rowMax], 0.08))
            .range([4, rightW - 6]);

          const yCenter = (k) => yBand(k) + yBand.bandwidth() / 2;

          const gRight = gRoot
            .append("g")
            .attr("transform", `translate(${wMain},${topH})`);
          gRight
            .append("rect")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", rightW)
            .attr("height", hMain)
            .attr("fill", "var(--panelOverlay)")
            .attr("stroke", "var(--panelOverlayStroke)");

          const rightLine = d3
            .line()
            .defined((d) => isFinite(d.m))
            .x((d) => xRight(d.m))
            .y((d) => yCenter(d.k))
            .curve(d3.curveCatmullRom.alpha(0.75));

          gRight
            .append("path")
            .datum(rowMeans)
            .attr("d", rightLine)
            .attr("fill", "none")
            .attr("stroke", COLORS.avgLine2)
            .attr("stroke-width", 1.6)
            .attr("opacity", 0.92);

          gRight
            .append("text")
            .attr("x", 8)
            .attr("y", 12)
            .attr("fill", "var(--muted)")
            .attr("font-size", 10)
            .attr("font-weight", 650)
            .text("m. o. days");

          const barW = Math.min(180, wMain * 0.34);
          const barH = 10;
          const gradId = "grad_" + Math.random().toString(16).slice(2);
          const defs = svg.append("defs");
          const grad = defs
            .append("linearGradient")
            .attr("id", gradId)
            .attr("x1", "0%")
            .attr("x2", "100%")
            .attr("y1", "0%")
            .attr("y2", "0%");
          const N = 30;
          for (let i = 0; i <= N; i++) {
            const p = i / N;
            grad
              .append("stop")
              .attr("offset", 100 * p + "%")
              .attr("stop-color", d3.interpolateTurbo(p));
          }
          const gBar = gRoot
            .append("g")
            .attr("transform", `translate(${wMain - barW},${topH - 16})`);
          gBar
            .append("rect")
            .attr("x", 0)
            .attr("y", 0)
            .attr("width", barW)
            .attr("height", barH)
            .attr("rx", 999)
            .attr("ry", 999)
            .attr("fill", `url(#${gradId})`)
            .attr("stroke", "var(--legendStroke)")
            .attr("opacity", 0.95);

          gBar
            .append("text")
            .attr("x", 0)
            .attr("y", -2)
            .text(vMin.toFixed(3))
            .attr("fill", "var(--muted)")
            .attr("font-size", 10)
            .attr("dominant-baseline", "ideographic");
          gBar
            .append("text")
            .attr("x", barW)
            .attr("y", -2)
            .text(vMax.toFixed(3))
            .attr("fill", "var(--muted)")
            .attr("font-size", 10)
            .attr("text-anchor", "end")
            .attr("dominant-baseline", "ideographic");
        }

        function updateAllViews() {
          if (state._updateMap) state._updateMap();
          renderStackedBars("#teaSvg", state.tea.rows, {
            title: "TEA",
            kind: "edge",
          });
          renderStackedBars("#tnaSvg", state.tna.rows, {
            title: "TNA",
            kind: "node",
          });
          renderPi("#piSvg", state.pi);
          renderMagHeatmap("#magSvg", state.magEigs);

          setBadge(
            "#teaBadge",
            `nov=${(state.tea.novelty ?? 0).toFixed(2)} · per=${(state.tea.persistence ?? 0).toFixed(2)}`,
          );
          setBadge(
            "#tnaBadge",
            `nov=${(state.tna.novelty ?? 0).toFixed(2)} · per=${(state.tna.persistence ?? 0).toFixed(2)}`,
          );

          const okPi = (state.pi || []).filter(
            (d) => isFinite(d.piF) && isFinite(d.piR),
          ).length;
          const wm =
            el.weightMode && el.weightMode.value === "weighted"
              ? "weighted"
              : "unweighted";
          setBadge(
            "#piBadge",
            okPi
              ? `LIC ok on ${okPi}/${T} days · ${wm}`
              : `LIC missing · ${wm}`,
          );

          const q = fmt3(+el.qCharge.value);
          setBadge("#magBadge", `K=${state.kEig} · q=${q} · ${wm}`);
          setBadge("#runBadge", `${state.focalCode || "—"} · K=${state.kEig}`);
        }

        function scheduleFullRerender() {
          if (state.rerenderPending) return;
          state.rerenderPending = true;
          requestAnimationFrame(() => {
            state.rerenderPending = false;
            if (!state.corop) return;
            // While spectra are still building we keep the UI responsive on resize.
            // Skip only during the very early phase before any new graph is available.
            if (state.busy && !state.phase1Ready) return;
            renderMap();
            updateAllViews();
          });
        }

        function installResizeHandling() {
          if (state.resizeInstalled) return;
          state.resizeInstalled = true;

          const obs = new ResizeObserver(() => scheduleFullRerender());
          ["mapSvg", "piSvg", "teaSvg", "tnaSvg", "magSvg"].forEach((id) => {
            const n = document.getElementById(id);
            if (n) obs.observe(n);
          });
          window.addEventListener("resize", () => scheduleFullRerender(), {
            passive: true,
          });
        }

        function workerCode() {
          return `
            'use strict';
            importScripts('https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js');
            importScripts('https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js');

            const T = ${T};

            function mulberry32(seed){
              let t = seed >>> 0;
              return function(){
                t += 0x6D2B79F5;
                let x = Math.imul(t ^ (t >>> 15), 1 | t);
                x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
                return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
              };
            }

            function clamp01(x){ return Math.max(0, Math.min(1, x)); }

            function progress(stage, pct, extra){
              postMessage({type:'progress', stage, pct, extra: extra || null});
            }

            function randomPointInPolygon(feature, rng){
              const bb = turf.bbox(feature);
              const minX=bb[0], minY=bb[1], maxX=bb[2], maxY=bb[3];
              for(let k=0;k<25000;k++){
                const x = minX + rng() * (maxX-minX);
                const y = minY + rng() * (maxY-minY);
                const pt = turf.point([x,y]);
                if(turf.booleanPointInPolygon(pt, feature)){
                  return [x,y];
                }
              }
              return [(minX+maxX)/2, (minY+maxY)/2];
            }

            function buildNodes(payload, rng){
              const {focalCode, nFarms, focalFeature, regionNodes} = payload;

              const nodes = [];
              for(let i=0;i<nFarms;i++){
                const [x,y] = randomPointInPolygon(focalFeature, rng);
                nodes.push({ id: "F"+i, kind:"farm", corop:focalCode, x, y });
                if(i % 12 === 0){
                  progress('Sampling farm coordinates…', 0.05 + 0.07*(i/Math.max(1,nFarms)));
                }
              }
              regionNodes.forEach(r=>{
                nodes.push({ ...r, kind:"region" });
              });
              return nodes;
            }

            function buildEligiblePairs(nodes){
              const F = [];
              const R = [];
              nodes.forEach((n,i)=>{
                if(n.kind === "farm") F.push(i);
                else R.push(i);
              });

              const pairsFF = [];
              for(const u of F){
                for(const v of F){
                  if(u===v) continue;
                  pairsFF.push([u,v]);
                }
              }

              const pairsFR = [];
              const pairsRF = [];
              for(const u of F){
                for(const v of R) pairsFR.push([u,v]);
              }
              for(const u of R){
                for(const v of F) pairsRF.push([u,v]);
              }

              const pairsRR = [];
              for(const u of R){
                for(const v of R){
                  if(u===v) continue;
                  pairsRR.push([u,v]);
                }
              }

              return { F, R, pairsFF, pairsFR, pairsRF, pairsRR };
            }

            function edgeKey(u,v){ return u + "→" + v; }

            function sampleWeight(rng){
              const x = 1 + Math.floor(Math.pow(rng(), 2) * 120);
              return x;
            }

            function simulateEdges(elig, rng, pKeep, pBirthFF, pBirthX){
              const edgesByDay = [];
              let prev = new Map();

              for(let t=0;t<T;t++){
                const cur = new Map();

                for(const [k,e] of prev.entries()){
                  if(rng() < pKeep){
                    const w = clamp01(0.85 + 0.3*rng()) * e.w;
                    cur.set(k, {u:e.u, v:e.v, w});
                  }
                }

                const allPairs = [
                  {pairs:elig.pairsFF, p:pBirthFF},
                  {pairs:elig.pairsFR, p:pBirthX},
                  {pairs:elig.pairsRF, p:pBirthX},
                  {pairs:elig.pairsRR, p:pBirthX},
                ];

                for(const blk of allPairs){
                  const pBirth = blk.p;
                  for(const [u,v] of blk.pairs){
                    const k = edgeKey(u,v);
                    if(cur.has(k)) continue;
                    if(rng() < pBirth){
                      cur.set(k, {u,v,w: sampleWeight(rng)});
                    }
                  }
                }

                edgesByDay.push(Array.from(cur.values()));
                prev = cur;
                progress('Simulating daily edges…', 0.12 + 0.12*((t+1)/T), {day:t+1});
              }
              return edgesByDay;
            }

            function intersectionSize(a, b){
              let s = 0;
              for(const x of a) if(b.has(x)) s++;
              return s;
            }
            function difference(a, b){
              const d = new Set();
              for(const x of a) if(!b.has(x)) d.add(x);
              return d;
            }
            function countInSet(subset, setB){
              let c = 0;
              for(const x of subset) if(setB.has(x)) c++;
              return c;
            }

            function computeTEA(edgesByDay){
              const seen = new Set();
              let prev = new Set();
              const out = [];

              for(let t=0;t<edgesByDay.length;t++){
                const curr = new Set(edgesByDay[t].map(e => edgeKey(e.u, e.v)));

                const persist = intersectionSize(curr, prev);
                const births = difference(curr, prev);
                const reactivated = countInSet(births, seen);
                const novel = births.size - reactivated;
                const churn = difference(prev, curr).size;

                out.push({
                  t,
                  edge_count: curr.size,
                  persist_count: persist,
                  reactivated_count: reactivated,
                  new_count: novel,
                  ceased_prev_count: churn,
                  new_ratio: curr.size ? novel / curr.size : 0,
                  persist_ratio: curr.size ? persist / curr.size : 0
                });

                for(const k of births) seen.add(k);
                prev = curr;
              }

              const novelty = out.reduce((a,b)=>a+b.new_ratio,0) / Math.max(1,out.length);
              const persistence = out.reduce((a,b)=>a+b.persist_ratio,0) / Math.max(1,out.length);
              return { rows: out, novelty, persistence };
            }

            function computeTNA(edgesByDay){
              const seen = new Set();
              let prev = new Set();
              const out = [];

              for(let t=0;t<edgesByDay.length;t++){
                const curr = new Set();
                edgesByDay[t].forEach(e=>{ curr.add(e.u); curr.add(e.v); });

                const persist = intersectionSize(curr, prev);
                const births = difference(curr, prev);
                const reactivated = countInSet(births, seen);
                const novel = births.size - reactivated;
                const churn = difference(prev, curr).size;

                out.push({
                  t,
                  node_count: curr.size,
                  persist_count: persist,
                  reactivated_count: reactivated,
                  new_count: novel,
                  ceased_prev_count: churn,
                  new_ratio: curr.size ? novel / curr.size : 0,
                  persist_ratio: curr.size ? persist / curr.size : 0
                });

                for(const k of births) seen.add(k);
                prev = curr;
              }

              const novelty = out.reduce((a,b)=>a+b.new_ratio,0) / Math.max(1,out.length);
              const persistence = out.reduce((a,b)=>a+b.persist_ratio,0) / Math.max(1,out.length);
              return { rows: out, novelty, persistence };
            }

            function adjacencyMatrixFromEdges(edges, n, useWeights){
              const A = Array.from({length:n}, ()=>Array(n).fill(0));
              edges.forEach(e=>{
                const w = useWeights ? ((Number(e.w) > 0 && isFinite(Number(e.w))) ? Number(e.w) : 1) : 1;
                A[e.u][e.v] += w;
              });
              return A;
            }

            function inducedSubgraph(edges, n){
              const active = new Set();
              edges.forEach(e=>{ active.add(e.u); active.add(e.v); });

              const nodes = Array.from(active.values()).sort((a,b)=>a-b);
              const map = new Map(nodes.map((id, idx)=>[id, idx]));
              const m = nodes.length;

              const edgesNew = edges.map(e=>({u: map.get(e.u), v: map.get(e.v), w: e.w}))
                                    .filter(e=>e.u !== undefined && e.v !== undefined && e.u !== e.v);

              return { edgesNew, m };
            }

            function rowStochasticLazy(A, alpha){
              const n = A.length;
              const P = Array.from({length:n}, ()=>Array(n).fill(0));
              for(let i=0;i<n;i++){
                let out = 0;
                for(let j=0;j<n;j++) out += A[i][j];
                if(out === 0){
                  A[i][i] = 1;
                  out = 1;
                }
                for(let j=0;j<n;j++){
                  const base = A[i][j] / out;
                  P[i][j] = (1-alpha) * base + (i===j ? alpha : 0);
                }
              }
              return P;
            }

            function tarjanSCC(n, adj){
              let index = 0;
              const stack = [];
              const onStack = Array(n).fill(false);
              const indices = Array(n).fill(-1);
              const lowlink = Array(n).fill(0);
              const sccs = [];

              function strongconnect(v){
                indices[v] = index;
                lowlink[v] = index;
                index++;
                stack.push(v);
                onStack[v] = true;

                for(const w of adj[v]){
                  if(indices[w] === -1){
                    strongconnect(w);
                    lowlink[v] = Math.min(lowlink[v], lowlink[w]);
                  } else if(onStack[w]){
                    lowlink[v] = Math.min(lowlink[v], indices[w]);
                  }
                }

                if(lowlink[v] === indices[v]){
                  const scc = [];
                  while(true){
                    const w = stack.pop();
                    onStack[w] = false;
                    scc.push(w);
                    if(w === v) break;
                  }
                  sccs.push(scc);
                }
              }

              for(let v=0;v<n;v++){
                if(indices[v] === -1) strongconnect(v);
              }
              return sccs;
            }

            function stationaryDistribution(P, tol=1e-10, maxIter=2500){
              const n = P.length;
              let x = Array(n).fill(1/n);
              for(let it=0; it<maxIter; it++){
                const nx = Array(n).fill(0);
                for(let i=0;i<n;i++){
                  const xi = x[i];
                  if(xi === 0) continue;
                  const row = P[i];
                  for(let j=0;j<n;j++){
                    nx[j] += xi * row[j];
                  }
                }
                let diff = 0;
                for(let j=0;j<n;j++) diff += Math.abs(nx[j] - x[j]);
                x = nx;
                if(diff < tol) break;
              }
              const s = x.reduce((a,b)=>a+b,0) || 1;
              return x.map(v=>v/s);
            }

            function computePiMass(edgesByDay, nodes, alpha, useWeights){
              const n = nodes.length;
              const out = [];
              const type01 = nodes.map(d => d.kind === "farm" ? 0 : 1);

              for(let t=0;t<edgesByDay.length;t++){
                const A = adjacencyMatrixFromEdges(edgesByDay[t], n, useWeights);
                const Pfull = rowStochasticLazy(A, alpha);

                const adj = Array.from({length:n}, ()=>[]);
                edgesByDay[t].forEach(e=>{ adj[e.u].push(e.v); });
                const sccs = tarjanSCC(n, adj);
                let lic = [];
                for(const scc of sccs){
                  if(scc.length > lic.length) lic = scc;
                }

                if(lic.length < 2){
                  out.push({t, piF: NaN, piR: NaN, licSize: lic.length});
                  continue;
                }

                const idx = lic.slice().sort((a,b)=>a-b);
                const Psub = idx.map(i => idx.map(j => Pfull[i][j]));
                const pi = stationaryDistribution(Psub);

                let massF = 0, massR = 0;
                for(let k=0;k<idx.length;k++){
                  if(type01[idx[k]] === 0) massF += pi[k];
                  else massR += pi[k];
                }
                out.push({t, piF: massF, piR: massR, licSize: idx.length});
                progress('Computing π-mass (LIC)…', 0.30 + 0.14*((t+1)/T), {day:t+1});
              }
              return out;
            }

            function finalizeMagSpectrum(rawVals, n, k){
              const finite = (rawVals || [])
                .map(v => Number(v))
                .filter(v => isFinite(v))
                .sort((a,b)=>a-b);

              if(!finite.length) return Array(k).fill(NaN);

              // numeric.eig runs on the 2n×2n real block matrix, so each
              // eigenvalue of the Hermitian magnetic Laplacian appears twice.
              // Collapse those duplicated pairs, but keep multiplicity in the
              // original n×n spectrum.
              const paired = [];
              for(let i=0; i+1<finite.length && paired.length<n; i+=2){
                paired.push(0.5 * (finite[i] + finite[i+1]));
              }

              let out = paired;
              if(out.length < Math.min(n, k)){
                out = finite.slice(0, Math.min(n, finite.length));
              }

              const res = out.slice(0, Math.min(k, out.length));
              while(res.length < k) res.push(NaN);
              return res;
            }

            function diagonalJitterCopy(M, eps){
              const n = M.length;
              const out = M.map(row => row.slice());
              const base = eps || 1e-10;
              for(let i=0;i<n;i++){
                out[i][i] += base * (1 + i / Math.max(1, n - 1));
              }
              return out;
            }

            function jacobiEigenvaluesSymmetric(M, tol, maxSweeps){
              const n = M.length;
              if(n === 0) return [];
              if(n === 1) return [Number(M[0][0])];

              const A = M.map(row => row.slice());
              const threshold = tol || 1e-9;
              const sweeps = maxSweeps || 18;

              for(let sweep=0; sweep<sweeps; sweep++){
                let maxOff = 0;

                for(let p=0; p<n-1; p++){
                  for(let q=p+1; q<n; q++){
                    const apq = A[p][q];
                    const absApq = Math.abs(apq);
                    if(absApq > maxOff) maxOff = absApq;
                    if(absApq < threshold) continue;

                    const app = A[p][p];
                    const aqq = A[q][q];
                    const tau = (aqq - app) / (2 * apq);
                    const t = tau === 0
                      ? 1
                      : Math.sign(tau) / (Math.abs(tau) + Math.sqrt(1 + tau * tau));
                    const c = 1 / Math.sqrt(1 + t * t);
                    const s = t * c;

                    for(let r=0; r<n; r++){
                      if(r === p || r === q) continue;
                      const arp = A[r][p];
                      const arq = A[r][q];
                      const nrp = c * arp - s * arq;
                      const nrq = s * arp + c * arq;
                      A[r][p] = nrp;
                      A[p][r] = nrp;
                      A[r][q] = nrq;
                      A[q][r] = nrq;
                    }

                    const npp = c*c*app - 2*s*c*apq + s*s*aqq;
                    const nqq = s*s*app + 2*s*c*apq + c*c*aqq;
                    A[p][p] = npp;
                    A[q][q] = nqq;
                    A[p][q] = 0;
                    A[q][p] = 0;
                  }
                }

                if(maxOff < threshold) break;
              }

              const vals = [];
              for(let i=0;i<n;i++) vals.push(Number(A[i][i]));
              vals.sort((a,b)=>a-b);
              return vals;
            }

            function solveMagBlockSpectrum(B, n, k){
              const minFinite = Math.min(k, Math.max(2, Math.min(n, 4)));

              function good(res){
                let finite = 0;
                for(const v of res){
                  if(isFinite(v)) finite++;
                }
                return finite >= minFinite;
              }

              try{
                const eig = numeric.eig(B);
                const res = finalizeMagSpectrum(eig && eig.lambda ? eig.lambda.x : [], n, k);
                if(good(res)) return res;
              }catch(err){}

              // Day-1 graphs can be especially sparse / degenerate; a tiny
              // diagonal jitter stabilizes the eigensolver without changing the
              // visible spectrum in any meaningful way.
              try{
                const Bj = diagonalJitterCopy(B, 1e-10);
                const eig = numeric.eig(Bj);
                const res = finalizeMagSpectrum(eig && eig.lambda ? eig.lambda.x : [], n, k);
                if(good(res)) return res;
              }catch(err){}

              try{
                const vals = jacobiEigenvaluesSymmetric(
                  diagonalJitterCopy(B, 1e-12),
                  1e-8,
                  18,
                );
                const res = finalizeMagSpectrum(vals, n, k);
                if(good(res)) return res;
              }catch(err){}

              return Array(k).fill(NaN);
            }

            function magneticLaplacianEigenvalues(A, q, k){
              const n = A.length;

              const As = Array.from({length:n}, ()=>Array(n).fill(0));
              for(let i=0;i<n;i++){
                for(let j=i+1;j<n;j++){
                  const mag = 0.5 * (A[i][j] + A[j][i]);
                  As[i][j] = mag;
                  As[j][i] = mag;
                }
              }

              const d = Array(n).fill(0);
              for(let i=0;i<n;i++){
                let s = 0;
                for(let j=0;j<n;j++) s += As[i][j];
                d[i] = s;
              }
              const dinv2 = d.map(x => x > 0 ? 1/Math.sqrt(x) : 0);

              const Hre = Array.from({length:n}, ()=>Array(n).fill(0));
              const Him = Array.from({length:n}, ()=>Array(n).fill(0));
              const twoPiQ = 2*Math.PI*q;

              for(let i=0;i<n;i++){
                for(let j=i+1;j<n;j++){
                  const mag = As[i][j];
                  if(mag === 0) continue;
                  const sgn = Math.sign(A[i][j] - A[j][i]);
                  const theta = twoPiQ * sgn;
                  const c = Math.cos(theta);
                  const s = Math.sin(theta);
                  Hre[i][j] = mag * c;
                  Him[i][j] = mag * s;
                  Hre[j][i] = mag * c;
                  Him[j][i] = -mag * s;
                }
              }

              const Lre = Array.from({length:n}, ()=>Array(n).fill(0));
              const Lim = Array.from({length:n}, ()=>Array(n).fill(0));

              for(let i=0;i<n;i++){
                for(let j=0;j<n;j++){
                  const scale = dinv2[i] * dinv2[j];
                  const mre = scale * Hre[i][j];
                  const mim = scale * Him[i][j];
                  Lre[i][j] = (i===j ? 1 : 0) - mre;
                  Lim[i][j] = -mim;
                }
                if(d[i] === 0){
                  Lre[i][i] = 0;
                  Lim[i][i] = 0;
                }
              }

              const N2 = 2*n;
              const B = Array.from({length:N2}, ()=>Array(N2).fill(0));
              for(let i=0;i<n;i++){
                for(let j=0;j<n;j++){
                  const x = Lre[i][j];
                  const y = Lim[i][j];
                  B[i][j] = x;
                  B[i][j+n] = -y;
                  B[i+n][j] = y;
                  B[i+n][j+n] = x;
                }
              }

              return solveMagBlockSpectrum(B, n, k);
            }

            function computeMagSpectrum(edgesByDay, nodes, q, k, quality, magStep, useWeights){
              const n = nodes.length;
              const out = Array.from({length: T}, (_,t)=>({t, vals: Array(k).fill(NaN)}));

              const step = Math.max(1, magStep || 1);
              const useInduced = (quality !== 'full');

              const computedTs = [];
              for(let t=0;t<edgesByDay.length;t+=step){
                const edges = edgesByDay[t];

                let A;
                if(useInduced){
                  const ind = inducedSubgraph(edges, n);
                  const m = ind.m;
                  if(m < 2){
                    out[t].vals = Array(k).fill(NaN);
                    postMessage({type:'mag_partial', t, vals: out[t].vals});
                    computedTs.push(t);
                    continue;
                  }
                  A = adjacencyMatrixFromEdges(ind.edgesNew, m, useWeights);
                }else{
                  A = adjacencyMatrixFromEdges(edges, n, useWeights);
                }

                const vals = magneticLaplacianEigenvalues(A, q, k);
                out[t].vals = vals;
                postMessage({type:'mag_partial', t, vals});
                computedTs.push(t);

                const p = 0.44 + 0.52*((computedTs.length)/Math.max(1, Math.ceil(T/step)));
                progress('Computing magnetic spectra…', p, {day:t+1});
              }

              if(step > 1){
                progress('Interpolating skipped days…', 0.98);

                for(let t=0;t<T;t++){
                  if(computedTs.includes(t)) continue;

                  let prev = -1, next = -1;
                  for(let i=computedTs.length-1;i>=0;i--){
                    if(computedTs[i] < t){ prev = computedTs[i]; break; }
                  }
                  for(let i=0;i<computedTs.length;i++){
                    if(computedTs[i] > t){ next = computedTs[i]; break; }
                  }

                  if(prev >= 0 && next >= 0){
                    const a = out[prev].vals;
                    const b = out[next].vals;
                    const w = (t - prev) / (next - prev);
                    const vals = Array(k).fill(NaN);
                    for(let j=0;j<k;j++){
                      const va = a[j], vb = b[j];
                      if(isFinite(va) && isFinite(vb)) vals[j] = (1-w)*va + w*vb;
                      else if(isFinite(va)) vals[j] = va;
                      else if(isFinite(vb)) vals[j] = vb;
                    }
                    out[t].vals = vals;
                  }else if(prev >= 0){
                    out[t].vals = out[prev].vals.slice();
                  }else if(next >= 0){
                    out[t].vals = out[next].vals.slice();
                  }
                  postMessage({type:'mag_partial', t, vals: out[t].vals});
                }
              }

              return out;
            }

            onmessage = (e)=>{
              const msg = e.data || {};
              const payload = msg.payload || {};

              if(msg.type === 'run'){
                try{
                  progress('Initializing worker…', 0.01);

                  const rng = mulberry32(payload.seed || 1);

                  progress('Building hybrid nodes…', 0.04);
                  const nodes = buildNodes(payload, rng);

                  progress('Preparing eligible pairs…', 0.12);
                  const elig = buildEligiblePairs(nodes);

                  const edgesByDay = simulateEdges(elig, rng, payload.pKeep, payload.pBirthFF, payload.pBirthX);

                  progress('Computing TEA/TNA…', 0.24);
                  const tea = computeTEA(edgesByDay);
                  const tna = computeTNA(edgesByDay);

                  progress('Computing π-mass (LIC)…', 0.30);
                  const useWeights = !!payload.useWeights;

                  const pi = computePiMass(edgesByDay, nodes, payload.alphaLazy ?? 0.10, useWeights);

                  progress('Publishing network + TEA/TNA + π-mass…', 0.43);
                  postMessage({type:'phase1', nodes, edgesByDay, tea, tna, pi});

                  setTimeout(()=>{
                    try{
                      progress('Computing magnetic spectra…', 0.44);
                      const mag = computeMagSpectrum(edgesByDay, nodes, payload.qCharge, payload.kEig, payload.quality, payload.magStep, useWeights);

                      progress('Finalizing…', 0.995);
                      postMessage({type:'done', mag});
                      progress('Done.', 1.0);
                    }catch(err2){
                      postMessage({type:'error', message: String(err2 && err2.message ? err2.message : err2)});
                    }
                  }, 0);
                }catch(err){
                  postMessage({type:'error', message: String(err && err.message ? err.message : err)});
                }
                return;
              }

              if(msg.type === 'stats'){
                try{
                  progress('Initializing worker…', 0.01);

                  const nodes = payload.nodes || [];
                  const edgesByDay = payload.edgesByDay || [];
                  const useWeights = !!payload.useWeights;

                  progress('Computing π-mass (LIC)…', 0.06);
                  const pi = computePiMass(edgesByDay, nodes, payload.alphaLazy ?? 0.10, useWeights);
                  postMessage({type:'pi', pi});

                  setTimeout(()=>{
                    try{
                      progress('Computing magnetic spectra…', 0.44);
                      const mag = computeMagSpectrum(edgesByDay, nodes, payload.qCharge, payload.kEig, payload.quality, payload.magStep, useWeights);

                      progress('Finalizing…', 0.995);
                      postMessage({type:'done', mag});
                      progress('Done.', 1.0);
                    }catch(err2){
                      postMessage({type:'error', message: String(err2 && err2.message ? err2.message : err2)});
                    }
                  }, 0);
                }catch(err){
                  postMessage({type:'error', message: String(err && err.message ? err.message : err)});
                }
                return;
              }
            };
          `;
        }

        function ensureWorker() {
          if (state.workerURL) return;
          const blob = new Blob([workerCode()], {
            type: "application/javascript",
          });
          state.workerURL = URL.createObjectURL(blob);
        }

        function terminateWorker() {
          if (state.worker) {
            state.worker.terminate();
            state.worker = null;
          }
        }

        function collectRegionNodes(focalCode) {
          const regionNodes = [];
          for (const [code, xy] of state.labelXYByCode.entries()) {
            if (String(code) === String(focalCode)) continue;
            const name = state.coropNameByCode.get(code) || code;
            regionNodes.push({
              id: "R_" + code,
              kind: "region",
              corop: String(code),
              name: String(name),
              x: xy[0],
              y: xy[1],
            });
          }
          regionNodes.sort((a, b) => a.corop.localeCompare(b.corop));
          return regionNodes;
        }

        function applyQuality() {
          const q = el.qualitySelect.value;
          const preset = QUALITY_PRESETS[q] || QUALITY_PRESETS.balanced;
          state.kEig = preset.kEig;
          state.magStep = preset.magStep;
        }

        function regenerate() {
          if (!state.corop || !state.labels) return;

          applyQuality();

          const focal = el.coropSelect.value;
          const nFarms = Math.min(100, Math.max(1, +el.farmCount.value));
          const pKeep = +el.pKeep.value;
          const pBirthFF = +el.pBirthFF.value;
          const pBirthX = +el.pBirthX.value;
          const qCharge = +el.qCharge.value;
          const seed = +el.seed.value;
          const quality = el.qualitySelect.value;

          state.focalCode = focal;
          state.day = +el.daySlider.value;

          const focalFeat = state.corop.features.find(
            (f) => String(f.properties.statcode) === String(focal),
          );
          if (!focalFeat) {
            setStatus("Focal COROP not found in geojson.");
            return;
          }

          const regionNodes = collectRegionNodes(focal);

          ensureWorker();
          terminateWorker();

          state.phase1Ready = false;

          setBusy(true);
          state.hoverCancel = false;
          setProgress(`Starting worker… (${quality})`, 0.02);
          setBadge("#mapBadge", "computing…");

          state.magEigs = d3
            .range(0, T)
            .map((t) => ({ t, vals: Array(state.kEig).fill(NaN) }));
          renderMagHeatmap("#magSvg", state.magEigs);
          setBadge(
            "#magBadge",
            `K=${state.kEig} · q=${fmt3(qCharge)} · ${quality}`,
          );

          state.worker = new Worker(state.workerURL);
          state.worker.onmessage = (evt) => {
            const msg = evt.data || {};
            if (msg.type === "progress") {
              const stage = msg.stage || "Working…";
              const pct = msg.pct ?? 0;
              const extra = msg.extra || null;
              const detail = extra && extra.day ? ` (${extra.day}/${T})` : "";
              setProgress(stage + detail, pct);
              return;
            }
            if (msg.type === "mag_partial") {
              const t = msg.t;
              if (state.magEigs && state.magEigs[t]) {
                const vals = msg.vals || [];
                const v = vals.slice(0, state.kEig);
                while (v.length < state.kEig) v.push(NaN);
                state.magEigs[t].vals = v;
                renderMagHeatmap("#magSvg", state.magEigs);
              }
              return;
            }
            if (msg.type === "phase1") {
              state.nodes = msg.nodes || [];
              state.edgesByDay = msg.edgesByDay || [];
              state.tea = msg.tea || { rows: [], novelty: 0, persistence: 0 };
              state.tna = msg.tna || { rows: [], novelty: 0, persistence: 0 };
              state.pi = msg.pi || [];
              state.phase1Ready = true;

              renderMap();
              updateAllViews();
              return;
            }
            if (msg.type === "done") {
              if (Array.isArray(msg.mag)) {
                state.magEigs = msg.mag.map((r) => {
                  const vals = (r.vals || []).slice(0, state.kEig);
                  while (vals.length < state.kEig) vals.push(NaN);
                  return { t: r.t, vals };
                });
              }
              updateAllViews();

              setBusy(false);
              setStatus("Done.");
              setBadge("#mapBadge", "ready");

              scheduleFullRerender(); // ensure final fit after any layout changes mid-run
              terminateWorker();
              return;
            }
            if (msg.type === "error") {
              console.error(msg.message);
              setBusy(false);
              setStatus("Worker error: " + msg.message);
              setBadge("#mapBadge", "error");
              terminateWorker();
              return;
            }
          };
          state.worker.onerror = (err) => {
            console.error(err);
            setBusy(false);
            setStatus("Worker crashed. See console.");
            setBadge("#mapBadge", "error");
            terminateWorker();
          };

          state.worker.postMessage({
            type: "run",
            payload: {
              focalCode: focal,
              nFarms,
              focalFeature: focalFeat,
              regionNodes,
              seed,
              pKeep,
              pBirthFF,
              pBirthX,
              qCharge,
              alphaLazy: 0.1,
              useWeights: el.weightMode && el.weightMode.value === "weighted",
              kEig: state.kEig,
              quality,
              magStep: state.magStep,
            },
          });
        }

        function recomputePiMag() {
          if (
            !state.nodes ||
            !state.nodes.length ||
            !state.edgesByDay ||
            !state.edgesByDay.length
          ) {
            regenerate();
            return;
          }

          applyQuality();

          const qCharge = +el.qCharge.value;
          const quality = el.qualitySelect.value;
          const wm =
            el.weightMode && el.weightMode.value === "weighted"
              ? "weighted"
              : "unweighted";

          ensureWorker();
          terminateWorker();

          setBusy(true);
          state.hoverCancel = false;
          setProgress(`Recomputing π-mass + spectra… (${wm})`, 0.02);

          state.pi = d3
            .range(0, T)
            .map((t) => ({ t, piF: NaN, piR: NaN, licSize: 0 }));
          state.magEigs = d3
            .range(0, T)
            .map((t) => ({ t, vals: Array(state.kEig).fill(NaN) }));

          renderPi("#piSvg", state.pi);
          renderMagHeatmap("#magSvg", state.magEigs);

          setBadge("#piBadge", `computing… · ${wm}`);
          setBadge(
            "#magBadge",
            `K=${state.kEig} · q=${fmt3(qCharge)} · ${quality} · ${wm}`,
          );

          state.worker = new Worker(state.workerURL);
          state.worker.onmessage = (evt) => {
            const msg = evt.data || {};
            if (msg.type === "progress") {
              const stage = msg.stage || "Working…";
              const pct = msg.pct ?? 0;
              const extra = msg.extra || null;
              const detail = extra && extra.day ? ` (${extra.day}/${T})` : "";
              setProgress(stage + detail, pct);
              return;
            }
            if (msg.type === "pi") {
              state.pi = msg.pi || [];
              renderPi("#piSvg", state.pi);
              updateAllViews();
              return;
            }
            if (msg.type === "mag_partial") {
              const t = msg.t;
              if (state.magEigs && state.magEigs[t]) {
                const vals = msg.vals || [];
                const v = vals.slice(0, state.kEig);
                while (v.length < state.kEig) v.push(NaN);
                state.magEigs[t].vals = v;
                renderMagHeatmap("#magSvg", state.magEigs);
              }
              return;
            }
            if (msg.type === "done") {
              if (Array.isArray(msg.mag)) {
                state.magEigs = msg.mag.map((r) => {
                  const vals = (r.vals || []).slice(0, state.kEig);
                  while (vals.length < state.kEig) vals.push(NaN);
                  return { t: r.t, vals };
                });
              }
              updateAllViews();

              setBusy(false);
              setStatus("Done.");

              scheduleFullRerender();
              terminateWorker();
              return;
            }
            if (msg.type === "error") {
              console.error(msg.message);
              setBusy(false);
              setStatus("Worker error: " + msg.message);
              terminateWorker();
              return;
            }
          };
          state.worker.onerror = (err) => {
            console.error(err);
            setBusy(false);
            setStatus("Worker crashed. See console.");
            terminateWorker();
          };

          state.worker.postMessage({
            type: "stats",
            payload: {
              nodes: state.nodes,
              edgesByDay: state.edgesByDay,
              alphaLazy: 0.1,
              qCharge,
              useWeights: wm === "weighted",
              kEig: state.kEig,
              quality,
              magStep: state.magStep,
            },
          });
        }
        function wireEvents() {
          el.coropSelect.addEventListener("change", () => regenerate());
          el.regenBtn.addEventListener("click", () => regenerate());

          el.daySlider.addEventListener("input", () => {
            state.day = +el.daySlider.value;
            updateAllViews();
          });

          if (el.weightMode)
            el.weightMode.addEventListener("change", () => recomputePiMag());

          function regenOnChange(elm) {
            elm.addEventListener("change", () => regenerate());
          }
          [
            el.farmCount,
            el.pKeep,
            el.pBirthFF,
            el.pBirthX,
            el.qCharge,
            el.seed,
            el.qualitySelect,
          ].forEach(regenOnChange);

          if (el.statusBox) {
            el.statusBox.addEventListener("mouseenter", () => {
              if (!state.busy) return;
              state.hoverCancel = true;
              d3.select("#statusText").text("Cancel build");
            });
            el.statusBox.addEventListener("mouseleave", () => {
              if (!state.busy) return;
              state.hoverCancel = false;
              d3.select("#statusText").text(state.progressStage || "Working…");
            });
            el.statusBox.addEventListener("click", () => {
              if (!state.busy) return;
              terminateWorker();
              setBusy(false);
              setStatus("Canceled.");
              setBadge("#mapBadge", "ready");
              scheduleFullRerender();
            });
            el.statusBox.addEventListener("keydown", (evt) => {
              if (!state.busy) return;
              if (evt.key === "Enter" || evt.key === " ") {
                evt.preventDefault();
                terminateWorker();
                setBusy(false);
                setStatus("Canceled.");
                setBadge("#mapBadge", "ready");
                scheduleFullRerender();
              }
            });
          }
        }

        async function loadGeo() {
          setStatus("Loading nl_corop.geojson…");
          const corop = await fetch("./assets/files/nl_corop.geojson").then(
            (r) => r.json(),
          );
          setStatus("Loading nl_corop_labelpoint.geojson…");
          const labels = await fetch(
            "./assets/files/nl_corop_labelpoint.geojson",
          ).then((r) => r.json());

          state.corop = corop;
          state.labels = labels;

          state.coropList = corop.features
            .map((f) => ({
              code: String(f.properties.statcode),
              name: String(f.properties.statnaam || ""),
            }))
            .sort((a, b) => a.code.localeCompare(b.code));

          state.coropNameByCode = new Map(
            state.coropList.map((d) => [d.code, d.name || d.code]),
          );

          state.labelXYByCode = new Map();
          labels.features.forEach((f) => {
            const code = String(f.properties.statcode);
            const [x, y] = f.geometry.coordinates;
            if (isFinite(x) && isFinite(y)) {
              state.labelXYByCode.set(code, [x, y]);
            }
          });

          populateCoropSelect();
          setStatus("Ready.");
          setBadge("#mapBadge", "ready");
          setBadge("#topBadge", "ready");

          installResizeHandling();
        }

        wireValueMirrors();
        wireEvents();
        installControlsCollapseHandling();
        initThemeSync();

        loadGeo()
          .then(() => regenerate())
          .catch((err) => {
            console.error(err);
            setStatus(
              "Failed to load geojson. Put the files next to this HTML and serve over http.",
            );
            setBadge("#mapBadge", "error");
          });
      })();
    </script>
      </div>
  </body>
</html>
